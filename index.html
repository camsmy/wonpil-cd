<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonpil Unpiltered CD</title>
    <style>
        :root {
            --paper: #dcd0c0;
            --accent: #b85c38;
        }

        body {
            background: radial-gradient(circle, #2c2c2c 0%, #111 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--paper);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }

        h1 {
            font-variant: small-caps;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .viewfinder {
            width: 260px; 
            height: 260px; 
            border: 12px solid #222;
            border-radius: 50%;
            overflow: hidden; 
            position: relative;
            background: #000;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            animation: flicker 0.15s infinite;
        }

        #disc {
            position: absolute;
            width: 1050px; 
            height: 1050px;
            left: 50%;
            /* Centers rotation and aligns the 14-frame window */
            margin-left: -540px;
            top: -40px;
            transform: rotate(-12.857deg);
            transform-origin: center center;
            transition: none;
        }

        .vintage-filter {
            filter: sepia(0.6) contrast(1.2) brightness(0.8) grayscale(0.2);
        }

        .controls {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
            border: 1px solid #444;
            border-radius: 8px;
            text-align: center;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
            margin-top: 15px; 
        }

        button {
            padding: 10px;
            cursor: pointer;
            border: 1px solid #111;
            background: #444;
            color: #ccc;
            font-family: inherit;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.1s;
        }

        button:active { transform: translateY(1px); }
        button.active { background: var(--accent); color: white; border-color: #803c21; }

        .extra-tools {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        #filter-toggle { background: #444; width: 100%; }

        input[type=range] { 
            width: 100%; 
            margin-top: 10px; 
            accent-color: var(--accent); 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Wonpil Unpiltered CD</h1>

    <div class="viewfinder">
        <img src="frame1.png" id="disc" class="vintage-filter" alt="Zoetrope Disc">
    </div>

    <div class="controls">
        <div style="font-size: 0.8rem; margin-bottom: 5px;">SPEED: <span id="fps-label">30</span> RPM</div>
        <input type="range" id="speed" min="3" max="60" value="30" step="1">
        
        <div class="btn-group">
            <button id="reverse">REV</button>
            <button id="toggle">STOP</button>
            <button id="forward" class="active">FWD</button>
        </div>

        <div class="extra-tools">
            <button id="filter-toggle">Filter: ON</button>
        </div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const speedInput = document.getElementById('speed');
        const fpsLabel = document.getElementById('fps-label');
        const toggleBtn = document.getElementById('toggle');
        const filterBtn = document.getElementById('filter-toggle');
        const forwardBtn = document.getElementById('forward');
        const reverseBtn = document.getElementById('reverse');

        // Starting at the tilt defined in CSS
        let rotation = -12.857; 
        let isRunning = true;
        let direction = 1;
        let lastTime = 0;
        let isVintage = true;

        const step = 360 / 14; 

        function animate(time) {
            if (!isRunning) return;
            
            const rpm = speedInput.value;
            // Interval: 60,000ms / (RPM * 14 frames)
            const interval = 60000 / (rpm * 14); 
            const delta = time - lastTime;

            if (delta >= interval) {
                rotation -= (step * direction); 
                disc.style.transform = `rotate(${rotation}deg)`;
                lastTime = time;
            }
            requestAnimationFrame(animate);
        }

        speedInput.addEventListener('input', () => fpsLabel.textContent = speedInput.value);
        
        filterBtn.addEventListener('click', () => {
            isVintage = !isVintage;
            disc.classList.toggle('vintage-filter');
            filterBtn.textContent = isVintage ? "Filter: ON" : "Filter: OFF";
        });

        toggleBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            toggleBtn.textContent = isRunning ? "STOP" : "START";
            if (isRunning) requestAnimationFrame(animate);
        });

        forwardBtn.addEventListener('click', () => {
            direction = 1;
            forwardBtn.classList.add('active');
            reverseBtn.classList.remove('active');
        });

        reverseBtn.addEventListener('click', () => {
            direction = -1;
            reverseBtn.classList.add('active');
            forwardBtn.classList.remove('active');
        });

        requestAnimationFrame(animate);
    </script>
</body>
</html>
